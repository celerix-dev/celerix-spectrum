name: Publish to NPM
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Publish
        # --provenance is required for Trusted Publishing to work
        run: npm publish --access public --provenance
